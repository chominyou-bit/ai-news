name: 📰 AI 뉴스 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:        # GitHub에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 뉴스 수집 및 번역
        run: python3 fetch_news.py

      - name: news.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet \
            && echo "변경 없음 — 스킵" \
            || (git commit -m "📰 뉴스 업데이트: $(date +'%Y.%m.%d')" && git push)
